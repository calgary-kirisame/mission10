name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: package tests (pure core, no ROS)
        run: |
          set -euo pipefail
          for pkg in ros/*/; do
            echo "=== $pkg"
            (cd "$pkg" && python3 -m unittest discover -s test -t .)
          done
      - name: datagen tests (models/yolo, reuses ros/mission_engine core)
        run: (cd models/yolo && python3 -m unittest discover -s test -t .)
