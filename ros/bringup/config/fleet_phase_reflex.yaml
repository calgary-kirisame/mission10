# PX4 SITL fleet for the N=2 phase_reflex mission.
# pose is PX4_GZ_MODEL_POSE: "east,north,z,roll,pitch,yaw" (metres, radians).
#
# Spawns are shifted +5 m east of the world origin on purpose: ground truth comes
# from the world PosePublisher (bridged to a names-stripped TFMessage), and every
# non-model transform in that feed is model-relative, so it stays pinned near raw
# (0,0). Keeping each drone clear of the origin makes its model pose the unique
# nearby transform, so world_truth_to_odom's nearest-match is unambiguous.
world: default
model: x500            # ground-truth pose comes from the world PosePublisher (split per drone), feeding EV + UWB range
autostart: 4023        # 4023_gz_x500_ev: EKF2 fuses external vision, GPS velocity-only (set 4001 for a GPS-only baseline)
agent_port: 8888
home_gps:
  lat: 42.2658783
  lon: -83.7487304
  alt_m: 0.0
vehicles:
  - {namespace: px4_0, pose: "5,0,0,0,0,0"}
  - {namespace: px4_1, pose: "8,0,0,0,0,0"}
  - {namespace: px4_2, pose: "11,0,0,0,0,0"}
  - {namespace: px4_3, pose: "14,0,0,0,0,0"}
