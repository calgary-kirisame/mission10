# Shared across all four pinwheel_mission nodes (wildcard node name). The launch
# injects per-drone drone_index + vehicle_namespace on top of these.
/**:
  ros__parameters:
    setpoint_rate_hz: 20.0
    prestream_cycles: 10
    wait_for_start: true
    force_arm: true
    takeoff_altitude_m: 6.0
    takeoff_acceptance_m: 0.5
    takeoff_timeout_s: 40.0
    status_stale_timeout_s: 5.0
    drone_count: 4
    orbit_center_e_m: 0.0
    orbit_center_n_m: 4.6
    orbit_radius_m: 4.6
    orbit_speed_mps: 2.0
    orbit_revolutions: 10.0
    phase_step_deg: 90.0
    phase0_deg: -90.0
    spread_alt_step_m: 1.0
    climb_time_s: 6.0
    spread_time_s: 12.0
    descend_time_s: 6.0
    yaw_mode: inward
