# Shared across all four phased_orbits_mission nodes (wildcard node name). The
# launch injects per-drone drone_index + vehicle_namespace on top of these.
/**:
  ros__parameters:
    setpoint_rate_hz: 20.0
    prestream_cycles: 10
    wait_for_start: true
    force_arm: true
    takeoff_altitude_m: 6.0
    takeoff_acceptance_m: 0.5
    takeoff_timeout_s: 40.0
    status_stale_timeout_s: 5.0
    drone_count: 4
    orbit_center_e_m: 0.0
    orbit_center_n_m: 4.6
    orbit_radius_m: 4.6
    orbit_speed_mps: 2.0
    orbit_revolutions: 10.0
    phase_step_deg: 90.0
    phase0_deg: -90.0
    # Per-drone orbit speed modulation (see phased_orbit_setpoint). Offline-
    # optimized to lift the orbit min sep above the constant-speed floor on the
    # same circles. Zero amp = steady orbit. Both lists must be length drone_count.
    orbit_mod_amp: [-0.50, 0.43, 0.42, -0.29]
    orbit_mod_phase_deg: [358.0, 204.0, 72.0, 254.0]
    insertion_spin_deg: 235.0
    to_center_time_s: 3.0
    spiral_time_s: 10.0
    # staggered peel-off return: drones curl into their centers one at a time
    # (order high->low by default), validated ~3.0 m min sep, smooth/no reversal.
    peel_lead_in_s: 0.5
    peel_stagger_s: 3.0
    peel_duration_s: 4.0
    peel_spin_deg: 90.0
    peel_order: ""
    orbit_auto_start: false
    yaw_mode: tangent
    # Buffered Voronoi cell safety net (mechanism and radius sizing in _bvc_clip).
    bvc_enabled: true
    bvc_safety_radius_m: 0.75
    bvc_lookahead_m: 0.3
    # EKF global origin (MAAV field, drone-0 spawn); set once at link-up so
    # AUTO.RTL/Land and failsafes work with the local-only EV estimate. The launch
    # overrides this per drone with its own spawn LLA (home_gps + pose offset) so
    # global positions are physically true; these are the single-drone fallback.
    origin_lat: 42.2658783
    origin_lon: -83.7487304
    origin_alt: 0.0
